name: Feature request
description: Request an improvement tied to a real image input workflow.
title: "feature: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the product workflow first; that makes it easier to keep the API small and predictable.

        This project is focused on one product image field. Multi-file queues, resumable uploads, remote sources, storage provider SDK wrappers, storage-as-a-service behavior, and built-in cropper/editor UI are usually better handled by app code or dedicated uploader/editor tools.
  - type: dropdown
    id: use-case
    attributes:
      label: Use case
      options:
        - Avatar
        - CMS cover
        - Thumbnail
        - Admin form
        - Product image
        - Other
    validations:
      required: true
  - type: input
    id: framework-bundler
    attributes:
      label: Framework or bundler
      placeholder: "Next.js, Vite, Rsbuild, Remix, plain React..."
    validations:
      required: false
  - type: dropdown
    id: upload-pattern
    attributes:
      label: Upload pattern
      options:
        - Local preview only
        - Presigned PUT
        - Multipart POST
        - Raw PUT
        - Custom adapter
        - Not sure yet
    validations:
      required: true
  - type: dropdown
    id: scope-checklist
    attributes:
      label: Scope decision checklist item
      description: Which governance reason does this request satisfy?
      options:
        - Durable product image state
        - Submit-boundary safety
        - Byte-policy verification
        - Draft commit/discard/cleanup correctness
        - Explicit upload boundary without storage lock-in
        - Adoption trust without expanding scope
        - Not sure / may be outside scope
    validations:
      required: true
  - type: textarea
    id: governance-fit
    attributes:
      label: Governance fit
      description: Explain how this satisfies the checklist item above. If you selected "Not sure / may be outside scope", describe why it still belongs in this project.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is hard, missing, or too easy to get wrong today?
    validations:
      required: true
  - type: textarea
    id: requested-behavior
    attributes:
      label: Requested behavior
      description: Describe the smallest change that would help.
    validations:
      required: true
  - type: textarea
    id: workaround
    attributes:
      label: Current workaround
      description: If you have one, share the code shape or docs you are leaning on now.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Include libraries, local helpers, or API shapes you tried.
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This request is for one image field in a product workflow, not a generic upload queue.
          required: true
        - label: This request does not require adding a cloud SDK, storage service, remote source connector, or built-in image editor.
          required: true
        - label: This request fits one checklist item above, or the issue explains why the governance policy should change.
          required: true
