name: Usage report
description: Share real-world usage signals for product prioritization.
title: "usage: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing how image-drop-input is being used. These reports help prioritize docs, compatibility, and release polish. They are product signals, not a showcase requirement.

        Please label the relationship honestly. A maintainer-owned demo can prove that the published npm package works outside this repository, but it is not third-party adoption.
  - type: dropdown
    id: evidence-category
    attributes:
      label: Evidence category
      description: Pick the closest fit. This keeps repo-maintained examples, maintainer-owned demos, third-party usage, and production-adjacent evidence separate.
      options:
        - Third-party evaluation
        - Third-party product integration
        - Production-adjacent case study
        - Maintainer-owned external demo
        - Repo-maintained example or report
        - Other
    validations:
      required: true
  - type: dropdown
    id: reporter-relationship
    attributes:
      label: Reporter relationship
      options:
        - External user or evaluator
        - Project contributor
        - Maintainer
        - Other
    validations:
      required: true
  - type: dropdown
    id: use-case
    attributes:
      label: Use case
      options:
        - Avatar
        - CMS cover
        - Thumbnail
        - Admin form
        - Product image
        - Other
    validations:
      required: true
  - type: dropdown
    id: integration-status
    attributes:
      label: Integration status
      description: This is about where the package was tried, not whether the product is public.
      options:
        - Evaluating
        - Prototype or demo
        - Internal/admin tool
        - Staging product flow
        - Production product flow
        - Not applicable
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: Package version
      placeholder: "0.3.2"
    validations:
      required: true
  - type: dropdown
    id: package-source
    attributes:
      label: Package source
      description: Published npm installs are stronger evidence than local links or packed workspace tarballs.
      options:
        - Published npm package
        - Packed tarball from this repository
        - Local workspace link
        - Not sure
    validations:
      required: true
  - type: input
    id: react-version
    attributes:
      label: React version
      placeholder: "18.2, 19.2..."
    validations:
      required: false
  - type: input
    id: framework-bundler
    attributes:
      label: Framework or bundler
      placeholder: "Next.js, Vite, Rsbuild, Remix, plain React..."
    validations:
      required: true
  - type: dropdown
    id: integration-mode
    attributes:
      label: Integration mode
      options:
        - Local preview only
        - Prepare and upload
        - Draft lifecycle
        - Persistable guard only
        - Evaluating
    validations:
      required: true
  - type: dropdown
    id: upload-pattern
    attributes:
      label: Upload pattern
      options:
        - Local preview only
        - Presigned PUT
        - Multipart POST
        - Raw PUT
        - App endpoint upload
        - Mock/no upload
        - Custom adapter
        - Not sure yet
    validations:
      required: true
  - type: dropdown
    id: draft-lifecycle
    attributes:
      label: Draft lifecycle
      options:
        - Not used
        - Evaluating
        - Used with client commit
        - Used with server product submit transaction
    validations:
      required: true
  - type: textarea
    id: storage-contract
    attributes:
      label: Storage contract shape
      description: Share the high-level shape only. Do not include signed URLs, draft tokens, credentials, or private object keys.
      placeholder: "Presign route, draft commit endpoint, discard endpoint, TTL cleanup..."
    validations:
      required: false
  - type: input
    id: public-evidence-link
    attributes:
      label: Public evidence link
      description: Optional. Link a demo repo, public app page, docs page, issue, PR, or write-up only if it is safe to share.
      placeholder: "https://github.com/owner/repo"
    validations:
      required: false
  - type: textarea
    id: what-worked
    attributes:
      label: What worked well?
      description: Short notes are fine. Focus on concrete integration details.
    validations:
      required: false
  - type: textarea
    id: pain-points
    attributes:
      label: Pain points, missing docs, or adoption blockers
      description: What slowed adoption, caused uncertainty, or needed extra local code? Leave this blank if nothing blocked you.
    validations:
      required: false
  - type: textarea
    id: evidence-proves
    attributes:
      label: What does this evidence prove?
      description: "Examples: published npm install works in Next.js, draft lifecycle matched the form boundary, or the persistable guard caught preview-only state."
    validations:
      required: false
  - type: textarea
    id: evidence-limits
    attributes:
      label: What does this evidence not prove?
      description: "Examples: not a production endorsement, no real storage security review, no malware scanning, no CDN invalidation, or no public customer adoption."
    validations:
      required: false
  - type: textarea
    id: bug-prevention
    attributes:
      label: Did it prevent a real bug or reduce risk?
      description: For example, avoided saving blob URLs, avoided deleting the previous image too early, or clarified the server transaction.
    validations:
      required: false
  - type: input
    id: project-name
    attributes:
      label: Company or project name
      description: Optional. Leave blank if the project should stay private.
    validations:
      required: false
  - type: input
    id: website-url
    attributes:
      label: Website URL
      description: Optional. Share only if it is public and appropriate.
      placeholder: "https://example.com"
    validations:
      required: false
  - type: checkboxes
    id: public-quotation
    attributes:
      label: Public quotation permission
      description: GitHub issues are public. This controls whether maintainers may quote the report elsewhere.
      options:
        - label: Maintainers may quote this report publicly, using only the company/project name and URL I provided above.
          required: false
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Anything else that would help prioritize docs, compatibility, or release polish.
    validations:
      required: false
