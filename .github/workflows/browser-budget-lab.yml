name: Browser budget lab

on:
  workflow_dispatch:
    inputs:
      browsers:
        description: Comma-separated Playwright browsers to run
        required: true
        default: chromium,firefox

permissions:
  contents: read

jobs:
  browser-budget-lab:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: 22
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Resolve npm version from packageManager
        run: |
          NPM_VERSION="$(node -p 'require("./package.json").packageManager.split("@")[1]')"
          echo "NPM_VERSION=${NPM_VERSION}" >> "$GITHUB_ENV"

      - name: Install pinned npm
        run: npm install --global "npm@${NPM_VERSION}"

      - run: npm --version
      - run: npm ci

      - name: Install Playwright browsers
        run: |
          npx playwright install --with-deps $(echo "${{ inputs.browsers }}" | tr ',' ' ')

      - name: Run browser budget lab
        run: |
          mkdir -p .artifacts
          npm run browser:budget-lab -- \
            --browsers="${{ inputs.browsers }}" \
            --json-output=.artifacts/browser-budget-lab.json \
            --markdown-output=.artifacts/browser-budget-lab.md

      - uses: actions/upload-artifact@v7
        with:
          name: browser-budget-lab
          path: .artifacts/browser-budget-lab.*
          if-no-files-found: error
