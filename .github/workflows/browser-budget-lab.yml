name: Browser budget lab

on:
  workflow_dispatch:
    inputs:
      browsers:
        description: Comma-separated Playwright browsers to run
        required: true
        default: chromium,firefox

permissions:
  contents: read

jobs:
  browser-budget-lab:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: 22
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Resolve npm version from packageManager
        run: |
          NPM_VERSION="$(node -p 'require("./package.json").packageManager.split("@")[1]')"
          echo "NPM_VERSION=${NPM_VERSION}" >> "$GITHUB_ENV"

      - name: Install pinned npm
        run: npm install --global "npm@${NPM_VERSION}"

      - run: npm --version
      - run: npm ci

      - name: Resolve browser input
        id: resolve-browsers
        env:
          BROWSER_INPUT: ${{ inputs.browsers }}
        run: |
          node <<'NODE'
          const { appendFileSync } = require('node:fs');

          const allowed = new Set(['chromium', 'firefox', 'webkit']);
          const browsers = (process.env.BROWSER_INPUT || '')
            .split(',')
            .map((browser) => browser.trim())
            .filter(Boolean);

          if (browsers.length === 0) {
            throw new Error('At least one browser must be selected.');
          }

          for (const browser of browsers) {
            if (!allowed.has(browser)) {
              throw new Error(`Unsupported browser "${browser}". Use chromium, firefox, or webkit.`);
            }
          }

          appendFileSync(process.env.GITHUB_OUTPUT, `browsers=${browsers.join(',')}\n`);
          NODE

      - name: Install Playwright browsers
        env:
          BROWSERS: ${{ steps.resolve-browsers.outputs.browsers }}
        run: |
          node <<'NODE'
          const { spawnSync } = require('node:child_process');

          const browsers = (process.env.BROWSERS || '').split(',').filter(Boolean);
          const result = spawnSync(
            'npx',
            ['playwright', 'install', '--with-deps', ...browsers],
            { stdio: 'inherit' }
          );

          if (result.error) {
            throw result.error;
          }

          process.exit(result.status ?? 1);
          NODE

      - name: Run browser budget lab
        env:
          BROWSERS: ${{ steps.resolve-browsers.outputs.browsers }}
        run: |
          mkdir -p .artifacts
          npm run browser:budget-lab -- \
            --browsers="${BROWSERS}" \
            --json-output=.artifacts/browser-budget-lab.json \
            --markdown-output=.artifacts/browser-budget-lab.md

      - uses: actions/upload-artifact@v7
        with:
          name: browser-budget-lab
          path: .artifacts/browser-budget-lab.*
          if-no-files-found: error
