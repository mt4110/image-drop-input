name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to npm after the rehearsal steps pass
        required: true
        default: false
        type: boolean

env:
  NODE_VERSION: 22.14.0

concurrency:
  group: release-image-drop-input
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Resolve npm version from packageManager
        run: |
          NPM_VERSION="$(node -p 'require("./package.json").packageManager.split("@")[1]')"
          echo "NPM_VERSION=${NPM_VERSION}" >> "$GITHUB_ENV"

      - name: Install pinned npm
        run: npm install --global "npm@${NPM_VERSION}"

      - run: npm --version
      - run: npm ci
      - run: npm run release:pr:check

      - name: Pack publish artifact
        run: |
          mkdir -p artifacts
          npm pack --pack-destination artifacts

      - name: Resolve packed artifact
        id: packed-artifact
        run: node scripts/resolve-npm-tarball.mjs artifacts --expect-package-json package.json --github-output "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: ${{ steps.packed-artifact.outputs.tarball }}
          if-no-files-found: error
          retention-days: 7

      - name: Summarize release artifact gate
        shell: bash
        run: |
          TARBALL="${{ steps.packed-artifact.outputs.tarball }}"
          ENTRY_COUNT="$(tar -tzf "$TARBALL" | wc -l | xargs)"
          PACKED_BYTES="$(wc -c < "$TARBALL" | xargs)"

          {
            echo "### Release artifact gate"
            echo "- Workflow concurrency uses \`cancel-in-progress: false\`."
            echo "- Verification command: \`npm run release:pr:check\`."
            echo "- Packed artifact: \`${TARBALL}\`."
            echo "- Tarball count before upload: exactly one."
            echo "- Tarball summary: \`${ENTRY_COUNT}\` entries, \`${PACKED_BYTES}\` packed bytes."
          } >> "$GITHUB_STEP_SUMMARY"

  publish:
    needs: verify
    if: ${{ github.event_name == 'release' || github.event.inputs.publish == 'true' }}
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Resolve npm version from packageManager
        run: |
          NPM_VERSION="$(node -p 'require("./package.json").packageManager.split("@")[1]')"
          echo "NPM_VERSION=${NPM_VERSION}" >> "$GITHUB_ENV"

      - name: Install pinned npm
        run: npm install --global "npm@${NPM_VERSION}"

      - run: npm --version
      - run: npm ci

      - uses: actions/download-artifact@v7
        with:
          name: npm-package
          path: artifacts

      - name: Resolve publish artifact
        id: publish-artifact
        run: node scripts/resolve-npm-tarball.mjs artifacts --expect-package-json package.json --github-output "$GITHUB_OUTPUT"

      - name: Publish to npm
        run: npm publish "${{ steps.publish-artifact.outputs.tarball }}" --access public

      - name: Verify published npm metadata
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p 'require("./package.json").name')"
          PACKAGE_VERSION="$(node -p 'require("./package.json").version')"
          PACKAGE_SPEC="$PACKAGE_NAME@$PACKAGE_VERSION"
          EXPECTED_REPOSITORY_URL="$(node -p 'require("./package.json").repository.url')"
          EXPECTED_ENGINES_NODE="$(node -p 'require("./package.json").engines.node')"

          npm_view_or_empty() {
            npm view "$@" 2>/dev/null || true
          }

          for attempt in 1 2 3 4 5 6; do
            PUBLISHED_VERSION="$(npm_view_or_empty "$PACKAGE_SPEC" version)"
            LATEST_VERSION="$(npm_view_or_empty "$PACKAGE_NAME" dist-tags.latest)"
            REPOSITORY_URL="$(npm_view_or_empty "$PACKAGE_SPEC" repository.url)"
            ENGINES_NODE="$(npm_view_or_empty "$PACKAGE_SPEC" engines.node)"

            if [ "$PUBLISHED_VERSION" = "$PACKAGE_VERSION" ] &&
               [ "$LATEST_VERSION" = "$PACKAGE_VERSION" ] &&
               [ "$REPOSITORY_URL" = "$EXPECTED_REPOSITORY_URL" ] &&
               [ "$ENGINES_NODE" = "$EXPECTED_ENGINES_NODE" ]; then
              exit 0
            fi

            if [ "$attempt" -lt 6 ]; then
              sleep 10
            fi
          done

          echo "Published npm metadata verification failed for $PACKAGE_SPEC." >&2
          echo "version: expected $PACKAGE_VERSION, received ${PUBLISHED_VERSION:-'(missing)'}" >&2
          echo "latest: expected $PACKAGE_VERSION, received ${LATEST_VERSION:-'(missing)'}" >&2
          echo "repository.url: expected $EXPECTED_REPOSITORY_URL, received ${REPOSITORY_URL:-'(missing)'}" >&2
          echo "engines.node: expected $EXPECTED_ENGINES_NODE, received ${ENGINES_NODE:-'(missing)'}" >&2
          exit 1

      - name: Summarize npm publish gate
        shell: bash
        run: |
          PACKAGE_SPEC="$(node -p 'require("./package.json").name + "@" + require("./package.json").version')"
          TARBALL="${{ steps.publish-artifact.outputs.tarball }}"
          ENTRY_COUNT="$(tar -tzf "$TARBALL" | wc -l | xargs)"
          PACKED_BYTES="$(wc -c < "$TARBALL" | xargs)"

          {
            echo "### npm publish gate"
            echo "- Published artifact: \`${TARBALL}\`."
            echo "- Tarball count before npm publish: exactly one."
            echo "- Tarball summary: \`${ENTRY_COUNT}\` entries, \`${PACKED_BYTES}\` packed bytes."
            echo "- Authentication path: npm Trusted Publishing / OIDC."
            echo "- Registry metadata checked: exact version, \`dist-tags.latest\`, \`repository.url\`, and \`engines.node\`."
            echo "- Provenance follow-up: confirm npm shows provenance for \`${PACKAGE_SPEC}\` and links it to this workflow run."
          } >> "$GITHUB_STEP_SUMMARY"
