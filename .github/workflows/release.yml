name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to npm after the rehearsal steps pass
        required: true
        default: false
        type: boolean

env:
  NODE_VERSION: 22.14.0

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Resolve npm version from packageManager
        run: |
          NPM_VERSION="$(node -p 'require("./package.json").packageManager.split("@")[1]')"
          echo "NPM_VERSION=${NPM_VERSION}" >> "$GITHUB_ENV"

      - name: Install pinned npm
        run: npm install --global "npm@${NPM_VERSION}"

      - run: npm --version
      - run: npm ci
      - run: npm run release:pr:check

      - name: Pack publish artifact
        run: |
          mkdir -p artifacts
          npm pack --pack-destination artifacts

      - name: Resolve packed artifact
        id: packed-artifact
        shell: bash
        run: |
          mapfile -t tarballs < <(find artifacts -maxdepth 1 -type f -name '*.tgz' -print | sort)

          if [ "${#tarballs[@]}" -ne 1 ]; then
            echo "Expected exactly one npm package tarball in artifacts, found ${#tarballs[@]}." >&2
            if [ "${#tarballs[@]}" -gt 0 ]; then
              printf 'Found tarballs:\n' >&2
              printf '  %s\n' "${tarballs[@]}" >&2
            fi
            exit 1
          fi

          echo "tarball=${tarballs[0]}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: ${{ steps.packed-artifact.outputs.tarball }}
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: verify
    if: ${{ github.event_name == 'release' || github.event.inputs.publish == 'true' }}
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Resolve npm version from packageManager
        run: |
          NPM_VERSION="$(node -p 'require("./package.json").packageManager.split("@")[1]')"
          echo "NPM_VERSION=${NPM_VERSION}" >> "$GITHUB_ENV"

      - name: Install pinned npm
        run: npm install --global "npm@${NPM_VERSION}"

      - run: npm --version
      - run: npm ci

      - uses: actions/download-artifact@v7
        with:
          name: npm-package
          path: artifacts

      - name: Resolve publish artifact
        id: publish-artifact
        shell: bash
        run: |
          mapfile -t tarballs < <(find artifacts -maxdepth 1 -type f -name '*.tgz' -print | sort)

          if [ "${#tarballs[@]}" -ne 1 ]; then
            echo "Expected exactly one npm package tarball in artifacts, found ${#tarballs[@]}." >&2
            if [ "${#tarballs[@]}" -gt 0 ]; then
              printf 'Found tarballs:\n' >&2
              printf '  %s\n' "${tarballs[@]}" >&2
            fi
            exit 1
          fi

          echo "tarball=${tarballs[0]}" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        run: npm publish "${{ steps.publish-artifact.outputs.tarball }}" --access public
