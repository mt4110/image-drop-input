name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
jobs:
  verify-maintainer:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: 22
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Resolve npm version from packageManager
        run: |
          NPM_VERSION="$(node -p 'require("./package.json").packageManager.split("@")[1]')"
          echo "NPM_VERSION=${NPM_VERSION}" >> "$GITHUB_ENV"

      - name: Install pinned npm
        run: npm install --global "npm@${NPM_VERSION}"

      - run: npm --version
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build:examples
      - run: npm run check:package

  pack-consumer-artifact:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: 22
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Resolve npm version from packageManager
        run: |
          NPM_VERSION="$(node -p 'require("./package.json").packageManager.split("@")[1]')"
          echo "NPM_VERSION=${NPM_VERSION}" >> "$GITHUB_ENV"

      - name: Install pinned npm
        run: npm install --global "npm@${NPM_VERSION}"

      - run: npm --version
      - run: npm ci
      - run: npm run pack:consumer-smoke

      - uses: actions/upload-artifact@v4
        with:
          name: consumer-package
          path: .artifacts/image-drop-input.tgz
          if-no-files-found: error

  consumer-smoke:
    runs-on: ubuntu-latest
    needs: pack-consumer-artifact
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 18.18.0
          - 20.x
          - 22.x
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - uses: actions/download-artifact@v4
        with:
          name: consumer-package
          path: .artifacts

      - run: npm --version
      - run: npm run smoke:consumer:root-types
      - run: npm run smoke:consumer:headless-cjs
